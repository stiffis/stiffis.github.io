<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Celda 00 (verde suave) -->
  <rect x="50" y="50" width="75" height="75" fill="#5fb876" stroke="none" />

  <!-- Celdas 01, 02, 10, 20 (verde más claro) -->
  <rect x="125" y="50" width="75" height="75" fill="#a8e6b8" stroke="none" />
  <rect x="200" y="50" width="75" height="75" fill="#a8e6b8" stroke="none" />
  <rect x="50" y="125" width="75" height="75" fill="#a8e6b8" stroke="none" />
  <rect x="50" y="200" width="75" height="75" fill="#a8e6b8" stroke="none" />

  <!-- Celda 22 (rojo) -->
  <rect x="200" y="200" width="75" height="75" fill="#cd7f7f" stroke="none" />

  <!-- Bordes exteriores -->
  <rect x="50" y="50" width="300" height="300" fill="none" stroke="#2c3e50" stroke-width="3" />

  <!-- Líneas horizontales -->
  <line x1="50" y1="125" x2="350" y2="125" stroke="#2c3e50" stroke-width="2" />
  <line x1="50" y1="200" x2="350" y2="200" stroke="#2c3e50" stroke-width="2" />
  <line x1="50" y1="275" x2="350" y2="275" stroke="#2c3e50" stroke-width="2" />

  <!-- Líneas verticales -->
  <line x1="125" y1="50" x2="125" y2="350" stroke="#2c3e50" stroke-width="2" />
  <line x1="200" y1="50" x2="200" y2="350" stroke="#2c3e50" stroke-width="2" />
  <line x1="275" y1="50" x2="275" y2="350" stroke="#2c3e50" stroke-width="2" />
</svg>
